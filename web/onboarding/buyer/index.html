<!doctype html><html lang='sr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/static/styles.css'><title>Onboarding restoran</title></head><body>
<div class='page-head'><div class='container'><strong>Onboarding • Restoran</strong></div></div>
<section class='section'><div class='container'><form id='onboardingForm' class='form'><h2>Profil kupca</h2>
<label for='restaurant-name'>Naziv restorana</label><input id='restaurant-name' required placeholder='Bistro Novi Sad'>
<label for='buyer-location'>Lokacija</label><input id='buyer-location' required placeholder='Novi Sad'>
<label for='procurement-type'>Tip nabavke</label><select id='procurement-type'><option>Dnevna</option><option>Nedeljna</option><option>Sezonska</option></select>
<label for='buyer-priorities'>Prioriteti</label><textarea id='buyer-priorities' required placeholder='Lokalni proizvođači, stabilan kvalitet, transparentnost...'></textarea>
<div class='cta-row'><button class='btn btn-primary' type='submit'>Sačuvaj i otvori kontrolnu tablu</button></div></form></div></section>
<script src='/static/app.js'></script></body></html>
