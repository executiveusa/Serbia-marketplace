<!doctype html><html lang='sr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/static/styles.css'><title>Registracija</title></head><body>
<div class='page-head'><div class='container'><strong>Mreža Ukusa</strong><a href='/sr/'>Početna</a></div></div>
<section class='section'><div class='container'><h2>Registracija i organizacija</h2><form id='authForm' class='form'>
<label for='email'>Email</label><input id='email' required type='email' placeholder='ime@firma.rs'>
<label for='role'>Uloga</label><select id='role'><option value='grower'>Proizvođač</option><option value='buyer'>Restoran / Kupac</option></select>
<label for='org'>Naziv organizacije</label><input id='org' required placeholder='Gazdinstvo Petrović / Restoran Dunav'>
<p class='small'>Nakon prijave bićete preusmereni na onboarding tok prema ulozi.</p>
<div class='cta-row'><button class='btn btn-primary' type='submit'>Kreiraj nalog</button></div>
</form></div></section>
<script src='/static/app.js'></script></body></html>
